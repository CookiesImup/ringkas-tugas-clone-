<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Ringkas AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a28;--accent:#7c3aed;--accent2:#a855f7;--red:#ef4444;--green:#22c55e;--text:#e4e4e7;--text2:#a1a1aa;--text3:#52525b;--border:#27272a}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

.header{padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.h-title{font-size:15px;font-weight:700}
.badge{font-size:9px;background:var(--accent);color:#fff;padding:2px 7px;border-radius:8px;font-weight:600}
.h-right{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.btn-clr{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;margin-left:6px}
.btn-clr:active{background:var(--bg3)}

.chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;padding:24px}
.w-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.welcome h2{font-size:18px;font-weight:700}
.welcome p{font-size:13px;color:var(--text2);max-width:280px;line-height:1.5}
.tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.tag{font-size:11px;background:var(--bg2);border:1px solid var(--border);padding:5px 10px;border-radius:16px;color:var(--text2)}

.msg{max-width:88%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;word-wrap:break-word;overflow-wrap:break-word}
.msg-u{align-self:flex-end;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:4px}
.msg-a{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-a p{margin-bottom:6px}.msg-a p:last-child{margin-bottom:0}
.msg-a strong{color:var(--accent2)}
.msg-a code{background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px}
.msg-a pre{background:var(--bg);padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0;font-size:12px}
.msg-a pre code{background:none;padding:0}
.msg-a ul,.msg-a ol{padding-left:18px;margin:6px 0}
.msg-a li{margin-bottom:3px}
.msg-img{max-width:180px;max-height:120px;border-radius:8px;margin-top:6px;object-fit:cover;display:block}
.msg-err{align-self:center;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);font-size:13px;padding:8px 14px;border-radius:10px;max-width:90%;text-align:center}

.typing{align-self:flex-start;background:var(--bg2);border:1px solid var(--border);padding:10px 18px;border-radius:14px;border-bottom-left-radius:4px;display:flex;gap:4px;align-items:center}
.typing span{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.img-bar{display:none;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.img-bar.show{display:flex;align-items:center;gap:10px}
.img-bar img{width:44px;height:44px;object-fit:cover;border-radius:6px}
.img-bar-info{flex:1;min-width:0}
.img-bar-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.img-bar-size{font-size:10px;color:var(--text3)}
.img-bar-rm{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px;line-height:1}

.input-area{padding:10px 12px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:8px}
.btn-att{width:40px;height:40px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-att:active{background:var(--accent);color:#fff}
.i-wrap{flex:1;min-width:0}
.i-wrap textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:16px;font-family:inherit;resize:none;outline:none;max-height:120px;line-height:1.4}
.i-wrap textarea::placeholder{color:var(--text3)}
.i-wrap textarea:focus{border-color:var(--accent)}
.btn-send{width:40px;height:40px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-send:active:not(:disabled){opacity:.8}
#fileInput{display:none}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">⚡</div>
    <span class="h-title">Ringkas AI</span>
    <span class="badge">REALTIME</span>
  </div>
  <div class="h-right">
    <div class="dot"></div>
    <span>Online</span>
    <button class="btn-clr" onclick="clearChat()">Clear</button>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <div class="w-icon">⚡</div>
    <h2>Ringkas AI</h2>
    <p>AI real-time dengan akses internet. Tanya apa saja, kirim foto, dapatkan jawaban terkini.</p>
    <div class="tags">
      <span class="tag">🔍 Web Search</span>
      <span class="tag">📸 Foto</span>
      <span class="tag">⚡ Real-time</span>
    </div>
  </div>
</div>

<div class="img-bar" id="imgBar">
  <img id="imgThumb" src="" alt="">
  <div class="img-bar-info">
    <div class="img-bar-name" id="imgName"></div>
    <div class="img-bar-size" id="imgSize"></div>
  </div>
  <button class="img-bar-rm" onclick="removeImg()">✕</button>
</div>

<div class="input-area">
  <div class="input-row">
    <button class="btn-att" onclick="document.getElementById('fileInput').click()">📎</button>
    <input type="file" id="fileInput" accept="image/*" onchange="pickFile(event)">
    <div class="i-wrap">
      <textarea id="input" rows="1" placeholder="Ketik pertanyaan..." onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
    </div>
    <button class="btn-send" id="btnSend" onclick="send()">➤</button>
  </div>
</div>

<script>
const API='https://ringkas-api.ryalandsokay.workers.dev';
const SYS=`Kamu adalah Ringkas AI, asisten AI real-time yang bisa mengakses informasi terkini dari internet. Kamu selalu menggunakan data terbaru dari hasil pencarian web sebagai referensi utama. Jawab dalam Bahasa Indonesia yang natural dan informatif. Jika user mengirim foto, analisis dan jawab pertanyaan tentang foto tersebut.`;

let msgs=[],selImg=null,busy=false;
const chatEl=document.getElementById('chat');
const welEl=document.getElementById('welcome');
const inpEl=document.getElementById('input');
const btnEl=document.getElementById('btnSend');
const barEl=document.getElementById('imgBar');
const thumbEl=document.getElementById('imgThumb');
const nameEl=document.getElementById('imgName');
const sizeEl=document.getElementById('imgSize');

function autoH(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px'}
function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}
function scroll(){requestAnimationFrame(()=>chatEl.scrollTop=chatEl.scrollHeight)}

function pickFile(e){
  const f=e.target.files[0];
  if(!f)return;
  if(!f.type.startsWith('image/')){alert('Hanya file gambar yang didukung.');e.target.value='';return}
  if(f.size>10*1024*1024){alert('Maksimal 10MB.');e.target.value='';return}
  const r=new FileReader();
  r.onload=ev=>{
    selImg={b64:ev.target.result,name:f.name,size:f.size};
    thumbEl.src=ev.target.result;
    nameEl.textContent=f.name;
    sizeEl.textContent=fmtSize(f.size);
    barEl.classList.add('show');
  };
  r.readAsDataURL(f);
  e.target.value='';
}

function removeImg(){selImg=null;barEl.classList.remove('show');thumbEl.src=''}

function addMsg(role,content,imgUrl){
  if(welEl)welEl.remove();
  const d=document.createElement('div');
  d.className=role==='user'?'msg msg-u':'msg msg-a';
  if(role==='ai'){d.innerHTML=fmtMD(content)}
  else{
    d.textContent=content;
    if(imgUrl){const i=document.createElement('img');i.className='msg-img';i.src=imgUrl;d.appendChild(i)}
  }
  chatEl.appendChild(d);scroll();return d
}

function addErr(t){const d=document.createElement('div');d.className='msg-err';d.textContent=t;chatEl.appendChild(d);scroll()}

function showTyp(){const d=document.createElement('div');d.className='typing';d.id='typ';d.innerHTML='<span></span><span></span><span></span>';chatEl.appendChild(d);scroll()}
function hideTyp(){const e=document.getElementById('typ');if(e)e.remove()}

function fmtMD(t){
  t=t.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*(.+?)\*/g,'<em>$1</em>');
  t=t.replace(/^[-•]\s+(.+)$/gm,'<li>$1</li>');
  t=t.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  t=t.replace(/\n\n/g,'</p><p>');
  t=t.replace(/\n/g,'<br>');
  return'<p>'+t+'</p>'.replace(/<p><\/p>/g,'')
}

function buildContent(text,img){
  if(!img)return text;
  return[{type:'text',text:text||'Jelaskan foto ini'},{type:'image_url',image_url:{url:img}}]
}

async function send(){
  const text=inpEl.value.trim();
  if(!text&&!selImg)return;
  if(busy)return;

  const userText=text||'(mengirim foto)';
  const imgB64=selImg?selImg.b64:null;

  addMsg('user',userText,imgB64);

  msgs.push({role:'user',content:buildContent(text,imgB64)});

  inpEl.value='';inpEl.style.height='auto';removeImg();
  busy=true;btnEl.disabled=true;showTyp();

  try{
    const res=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:[{role:'system',content:SYS},...msgs]})
    });
    const data=await res.json();
    hideTyp();

    if(data.error){
      const em=data.details?.error?.message||data.error?.message||data.error||'Terjadi kesalahan';
      addErr(typeof em==='string'?em:JSON.stringify(em));
      return
    }

    const ai=data.choices?.[0]?.message?.content||'Maaf, tidak ada respons.';
    msgs.push({role:'assistant',content:ai});
    addMsg('ai',ai);
  }catch(err){
    hideTyp();addErr('Gagal menghubungi server. Coba lagi.');console.error(err)
  }finally{
    busy=false;btnEl.disabled=false;inpEl.focus()
  }
}

function clearChat(){
  msgs=[];chatEl.innerHTML='';
  const w=document.createElement('div');w.className='welcome';w.id='welcome';
  w.innerHTML='<div class="w-icon">⚡</div><h2>Ringkas AI</h2><p>AI real-time dengan akses internet. Tanya apa saja, kirim foto, dapatkan jawaban terkini.</p><div class="tags"><span class="tag">🔍 Web Search</span><span class="tag">📸 Foto</span><span class="tag">⚡ Real-time</span></div>';
  chatEl.appendChild(w)
}
</script>
</body>
</html>
